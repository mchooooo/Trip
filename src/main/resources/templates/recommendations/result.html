<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripAI | 추천 결과</title>
    <style>
        :root {
            --bg: #f3f7f5;
            --panel: rgba(255, 255, 255, 0.88);
            --ink: #1f2a21;
            --muted: #657067;
            --accent: #157a6e;
            --accent-soft: #dff3ee;
            --line: rgba(31, 42, 33, 0.1);
            --shadow: 0 20px 60px rgba(18, 46, 41, 0.14);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Pretendard", "SUIT", "Apple SD Gothic Neo", sans-serif;
            background:
                radial-gradient(circle at top right, rgba(21, 122, 110, 0.16), transparent 26%),
                linear-gradient(160deg, #f7f2e8 0%, #eef7f2 100%);
        }

        .wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        .nav {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 16px;
            border-radius: 14px;
            background: rgba(31, 42, 33, 0.06);
            color: var(--ink);
            text-decoration: none;
            font-weight: 700;
        }

        .hero {
            padding: 36px;
            border-radius: 30px;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .eyebrow {
            color: var(--accent);
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 13px;
        }

        h1 {
            margin: 10px 0 12px;
            font-size: clamp(40px, 7vw, 76px);
            line-height: 0.95;
            letter-spacing: -0.05em;
        }

        .summary {
            margin: 0;
            max-width: 640px;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.7;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 24px;
        }

        .chip {
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 700;
            font-size: 13px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 18px;
            margin-top: 22px;
        }

        .card {
            padding: 24px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid var(--line);
        }

        .card h2 {
            margin: 0 0 14px;
            font-size: 22px;
        }

        .card p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .meta {
            display: grid;
            gap: 12px;
        }

        .meta-item {
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(21, 122, 110, 0.06);
        }

        .meta-item strong {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .meta-item span {
            color: var(--muted);
        }

        .request-box {
            margin-top: 18px;
            padding: 18px 20px;
            border-radius: 18px;
            background: rgba(21, 122, 110, 0.06);
            border: 1px solid rgba(21, 122, 110, 0.1);
            color: var(--muted);
            line-height: 1.7;
        }

        @media (max-width: 860px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="wrap">
    <nav class="nav">
        <a class="button" th:href="@{/}">새 추천 만들기</a>
        <a class="button" th:href="@{/recommendations/history}">히스토리 보기</a>
    </nav>

    <section class="hero">
        <div class="eyebrow">TripAI Recommendation</div>
        <h1 th:text="${recommendation.destination}">부산</h1>
        <p class="summary" th:text="${recommendation.promptSummary}">추천 요약</p>

        <div class="chips">
            <span class="chip" th:if="${recommendation.companionType != null and !#strings.isEmpty(recommendation.companionType)}" th:text="${recommendation.companionType}">친구</span>
            <span class="chip" th:if="${recommendation.budgetLevel != null and !#strings.isEmpty(recommendation.budgetLevel)}" th:text="${recommendation.budgetLevel}">중간</span>
            <span class="chip" th:if="${recommendation.travelStyle != null and !#strings.isEmpty(recommendation.travelStyle)}" th:text="${recommendation.travelStyle}">맛집</span>
            <span class="chip" th:if="${recommendation.season != null and !#strings.isEmpty(recommendation.season)}" th:text="${recommendation.season}">가을</span>
        </div>

        <div class="grid">
            <article class="card">
                <h2>추천 이유</h2>
                <p th:text="${recommendation.reason}">추천 이유</p>
                <div class="request-box" th:if="${recommendation.userPrompt != null and !#strings.isEmpty(recommendation.userPrompt)}">
                    <strong style="display: block; margin-bottom: 8px; color: var(--ink);">사용자 추가 요청</strong>
                    <span th:text="${recommendation.userPrompt}">추가 요청</span>
                </div>
            </article>

            <aside class="meta">
                <div class="meta-item">
                    <strong>추천 ID</strong>
                    <span th:text="${recommendation.id}">1</span>
                </div>
                <div class="meta-item">
                    <strong>생성 시각</strong>
                    <span th:text="${#temporals.format(recommendation.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-08 19:00</span>
                </div>
                <div class="meta-item">
                    <strong>검증 포인트</strong>
                    <span>서비스 저장, 조회, 화면 렌더링까지 한 번에 확인할 수 있습니다.</span>
                </div>
            </aside>
        </div>
    </section>
</main>
</body>
</html>
