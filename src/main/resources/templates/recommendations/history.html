<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripAI | 추천 히스토리</title>
    <style>
        :root {
            --bg: #f5f1ea;
            --panel: rgba(255, 255, 255, 0.86);
            --ink: #1e2b25;
            --muted: #687269;
            --line: rgba(30, 43, 37, 0.1);
            --accent: #aa5a12;
            --accent-soft: rgba(170, 90, 18, 0.1);
            --shadow: 0 16px 44px rgba(42, 41, 36, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Pretendard", "SUIT", "Apple SD Gothic Neo", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(170, 90, 18, 0.14), transparent 24%),
                linear-gradient(140deg, #f8f3eb 0%, #f3f7f4 100%);
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 38px 20px 70px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .topbar h1 {
            margin: 0;
            font-size: clamp(32px, 4vw, 48px);
            letter-spacing: -0.04em;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 16px;
            border-radius: 14px;
            background: rgba(30, 43, 37, 0.06);
            color: var(--ink);
            text-decoration: none;
            font-weight: 700;
        }

        .panel {
            padding: 26px;
            border-radius: 28px;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .hint {
            margin: 0 0 20px;
            color: var(--muted);
        }

        .list {
            display: grid;
            gap: 14px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: center;
            padding: 18px 20px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(30, 43, 37, 0.06);
        }

        .row strong {
            display: block;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .row p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .chip {
            padding: 7px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
        }

        .empty {
            padding: 28px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.72);
            text-align: center;
            color: var(--muted);
        }

        @media (max-width: 820px) {
            .row,
            .topbar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="wrap">
    <div class="topbar">
        <div>
            <h1>추천 히스토리</h1>
            <p class="hint">저장된 추천 결과를 순서대로 확인하고 각 결과 화면으로 이동할 수 있어요.</p>
        </div>
        <a class="button" th:href="@{/}">홈으로 돌아가기</a>
    </div>

    <section class="panel">
        <div th:if="${#lists.isEmpty(recommendations)}" class="empty">
            아직 저장된 추천 결과가 없습니다.
        </div>

        <div th:unless="${#lists.isEmpty(recommendations)}" class="list">
            <article class="row" th:each="recommendation : ${recommendations}">
                <div>
                    <strong th:text="${recommendation.destination}">부산</strong>
                    <div class="chips">
                        <span class="chip" th:text="${recommendation.companionType}">친구</span>
                        <span class="chip" th:text="${recommendation.budgetLevel}">중간</span>
                        <span class="chip" th:text="${recommendation.travelStyle}">맛집</span>
                        <span class="chip" th:text="${recommendation.season}">가을</span>
                    </div>
                    <p th:text="${recommendation.reason}">추천 이유</p>
                </div>
                <a class="button" th:href="@{'/recommendations/' + ${recommendation.id} + '/result'}">결과 보기</a>
            </article>
        </div>
    </section>
</main>
</body>
</html>
